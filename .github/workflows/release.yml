name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on tags like v1.0, v2.1.3, etc.

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13' # Match the current version of the project

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "OPCUA_Client" --collect-submodules asyncua --add-data "app/widgets/scene3d/web;app/widgets/scene3d/web" main.py

      - name: Zip Windows Build
        run: |
          Compress-Archive -Path dist/OPCUA_Client/* -DestinationPath OPCUA_Client-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: OPCUA_Client-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build App with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "OPCUA_Client" --collect-submodules asyncua --add-data "app/widgets/scene3d/web:app/widgets/scene3d/web" main.py

      - name: Zip macOS Build
        run: |
          cd dist
          zip -r ../OPCUA_Client-macOS.zip OPCUA_Client.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: OPCUA_Client-macOS.zip

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OPCUA_Client-Windows.zip
            OPCUA_Client-macOS.zip
          draft: false
          prerelease: false
          generate_release_notes: true
